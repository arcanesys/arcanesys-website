<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Netlify form placeholder</title>
  </head>
  <body>
    <!--
      Static placeholder so Netlify's build-time form parser reliably
      detects the contact form. Astro renders the real form on
      /fr/contact/ and /en/contact/; both POST to name="contact"
      and redirect to /{lang}/contact/thanks/ on success.
      Do not link to this file from the site.
    -->
    <form name="contact" method="POST" data-netlify="true" netlify-honeypot="bot-field">
      <input type="hidden" name="form-name" value="contact" />
      <input type="text" name="bot-field" />
      <input type="hidden" name="locale" />
      <input type="hidden" name="topic" />
      <input type="text" name="name" />
      <input type="email" name="email" />
      <input type="text" name="org" />
      <input type="text" name="role" />
      <input type="number" name="fleet_size" />
      <input type="checkbox" name="regime[]" value="nis2_essential" />
      <input type="checkbox" name="regime[]" value="nis2_important" />
      <input type="checkbox" name="regime[]" value="dora" />
      <input type="checkbox" name="regime[]" value="iso" />
      <input type="checkbox" name="regime[]" value="anssi" />
      <input type="checkbox" name="regime[]" value="secnumcloud" />
      <input type="checkbox" name="regime[]" value="other" />
      <input type="checkbox" name="regime[]" value="unsure" />
      <textarea name="problem"></textarea>
    </form>
  </body>
</html>
